<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Document/Paper -->
  <rect x="120" y="80" width="272" height="352" rx="24" fill="url(#iconGrad)"/>
  
  <!-- Lines representing grades -->
  <rect x="160" y="140" width="192" height="16" rx="8" fill="#2563eb" opacity="0.3"/>
  <rect x="160" y="180" width="160" height="16" rx="8" fill="#2563eb" opacity="0.3"/>
  <rect x="160" y="220" width="180" height="16" rx="8" fill="#2563eb" opacity="0.3"/>
  
  <!-- Checkmarks for grades -->
  <circle cx="380" cy="148" r="20" fill="#22c55e"/>
  <path d="M370 148 L377 155 L390 142" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <circle cx="380" cy="188" r="20" fill="#22c55e"/>
  <path d="M370 188 L377 195 L390 182" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <circle cx="380" cy="228" r="20" fill="#f59e0b"/>
  <path d="M375 228 L385 228" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Grade A+ badge -->
  <circle cx="380" cy="340" r="60" fill="#2563eb"/>
  <text x="380" y="355" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">A+</text>
</svg>
